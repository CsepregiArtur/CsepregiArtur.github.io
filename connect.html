<html lang="en">
<head>

    <meta name="author" content="Artur Csepregi">
    <link rel="canonical" href="https://csepregiartur.github.io/connect">

    <!-- Open Graph -->
    <meta property="og:title" content="Artur Csepregi — Digital Business Card">
    <meta property="og:description" content="Manufacturing Leader | Operational Excellence & Digital Transformation">
    <meta property="og:image" content="https://csepregiartur.github.io/assets/og-image.svg">
    <meta property="og:url" content="https://csepregiartur.github.io/connect">

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">

    <style>
        /* ================================================================
           DIGITAL BUSINESS CARD — connect.html
           ================================================================ */

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: linear-gradient(160deg, #0F172A 0%, #1E3A8A 40%, #2563EB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(37,99,235,0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(30,58,138,0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ================================================================
           CARD CONTAINER
           ================================================================ */
        .card-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .business-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 48px 36px 40px;
            text-align: center;
            color: white;
            box-shadow:
                0 24px 80px rgba(0,0,0,0.35),
                0 0 0 1px rgba(255,255,255,0.06) inset;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .business-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 32px 96px rgba(0,0,0,0.45),
                0 0 0 1px rgba(255,255,255,0.1) inset;
        }

        /* ================================================================
           AVATAR
           ================================================================ */
        .avatar-section {
            position: relative;
            display: inline-block;
            margin-bottom: 28px;
        }

        .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #60A5FA, #93C5FD, #2563EB, #60A5FA);
            animation: ringSpin 6s linear infinite;
            opacity: 0.7;
        }

        @keyframes ringSpin { to { transform: rotate(360deg); } }

        .avatar {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.2);
            object-fit: cover;
            z-index: 1;
            background: linear-gradient(135deg, #334155, #1E293B);
        }

        /* ================================================================
           IDENTITY
           ================================================================ */
        .name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .title {
            font-size: 15px;
            font-weight: 600;
            color: #93C5FD;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 20px;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, #2563EB, #60A5FA);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .tagline {
            font-size: 15px;
            color: rgba(255,255,255,0.65);
            line-height: 1.65;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        /* ================================================================
           ACTION BUTTONS
           ================================================================ */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: var(--font-family);
            border: none;
        }

        .btn-primary {
            background: #2563EB;
            color: white;
        }
        .btn-primary:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(37,99,235,0.4);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 1.5px solid rgba(255,255,255,0.25);
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.45);
            transform: translateY(-2px);
        }

        .btn-linkedin {
            background: #0A66C2;
            color: white;
        }
        .btn-linkedin:hover {
            background: #084e96;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(10,102,194,0.4);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }
        .btn-linkedin svg { fill: white; }

        /* ================================================================
           CONTACT DETAILS
           ================================================================ */
        .contact-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .contact-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a.contact-row:hover {
            color: rgba(255,255,255,0.85);
        }

        .contact-row svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        /* ================================================================
           BACK LINK
           ================================================================ */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: rgba(255,255,255,0.75);
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 480px) {
            .business-card {
                padding: 36px 24px 32px;
                border-radius: 24px;
            }
            .name { font-size: 24px; }
            .btn { font-size: 14px; padding: 12px 20px; }
        }
    </style>
</head>
<body>

<div class="card-wrapper">

        <!-- Contact Details -->

            <a href="https://csepregiartur.github.io" class="contact-row">

                    <circle cx="12" cy="12" r="10"/>

                </svg>
                csepregiartur.github.io

        </div>

    </div>

    <!-- Back link -->
    <div style="text-align:center;">
        <a href="/" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="19" y1="12" x2="5" y2="12"/>

</div>

</body>
</html>
